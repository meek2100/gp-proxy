# File: docker-compose.yml
services:
  gp-proxy:
    image: ghcr.io/meek2100/gp-proxy:latest
    container_name: gp-proxy
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      - VPN_PORTAL=${VPN_PORTAL:-vpn.yourcompany.com}
      - VPN_MODE=${VPN_MODE:-standard}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_TOKEN=${API_TOKEN:-}
      - TZ=${TZ:-UTC}
      # PUID/PGID matching the host user prevents permission issues with mounted volumes
      - PUID=1000
      - PGID=1000
    networks:
      # If using gateway mode, you must connect this container to a macvlan network
      # to obtain a routable IP on your LAN.
      # Example: vpn_net
      - default
    ports:
      # SOCKS5 Proxy
      - "1080:1080/tcp"
      - "1080:1080/udp"
      # Web UI & API
      - "8001:8001/tcp"
      # UDP Beacon (Auto-Discovery)
      - "32800:32800/udp"
    volumes:
      # Optional: Mount for persistent logging
      - gp-logs:/tmp/gp-logs

volumes:
  gp-logs:

networks:
  default:
    driver: bridge
